name: Build iOS IPA

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Create placeholder assets (generated locally, not in repo)
        run: |
          touch assets/model.tflite
          for dir in assets/audio/boy/alphabet assets/audio/boy/vocabulary assets/audio/boy/sentences assets/audio/boy/stories \
                     assets/audio/girl/alphabet assets/audio/girl/vocabulary assets/audio/girl/sentences assets/audio/girl/stories \
                     assets/audio/young_man/alphabet assets/audio/young_man/vocabulary assets/audio/young_man/sentences assets/audio/young_man/stories \
                     assets/audio/young_woman/alphabet assets/audio/young_woman/vocabulary assets/audio/young_woman/sentences assets/audio/young_woman/stories \
                     assets/audio/man/alphabet assets/audio/man/vocabulary assets/audio/man/sentences assets/audio/man/stories \
                     assets/audio/woman/alphabet assets/audio/woman/vocabulary assets/audio/woman/sentences assets/audio/woman/stories \
                     assets/audio/alphabet assets/audio/vocabulary assets/audio/tones assets/audio/sentences assets/audio/stories assets/audio/dictionary \
                     assets/images; do
            mkdir -p "$dir"
            [ -z "$(ls -A $dir 2>/dev/null)" ] && touch "$dir/.gitkeep"
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build iOS (no signing - for CI)
        run: |
          flutter build ios --release --no-codesign

      - name: Create unsigned IPA
        run: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          mkdir -p Payload
          cp -r Runner.app Payload/
          zip -r ../ipa/awing-1.2.0-unsigned.ipa Payload
          rm -rf Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: awing-ios-unsigned
          path: build/ios/ipa/awing-1.2.0-unsigned.ipa
          retention-days: 30

      # === SIGNED BUILD (only on tags, requires secrets) ===
      - name: Install Apple certificate and provisioning profile
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          # Skip if secrets are not configured
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "::warning::Signing secrets not configured. Skipping signed build."
            exit 0
          fi

          # Create temp keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build signed iOS
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -z "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ]; then
            echo "Skipping signed build - secrets not configured"
            exit 0
          fi
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload signed IPA
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: awing-ios-signed
          path: build/ios/ipa/*.ipa
          retention-days: 90
          if-no-files-found: ignore

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
