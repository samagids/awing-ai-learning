name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-ios:
    runs-on: macos-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      # === DOWNLOAD PAD ASSETS FROM GITHUB RELEASE ===
      # iOS doesn't have Play Asset Delivery — instead, the same audio +
      # image tarball published by scripts/pack_and_upload_assets.sh is
      # extracted into ios/Runner/PADAssets/. That folder is registered
      # in project.pbxproj as a folder reference, so Xcode auto-bundles
      # everything inside it into Runner.app/PADAssets/.
      # AssetPackHandler.swift reads from there at runtime.
      - name: Download PAD asset bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Android-side placeholder so `flutter build` doesn't trip on
          # missing dirs (the iOS build doesn't ship these, but the
          # Flutter build phase still scans the workspace).
          mkdir -p android/install_time_assets/src/main/assets/audio
          mkdir -p android/install_time_assets/src/main/assets/images/vocabulary
          find android/install_time_assets -type d -empty -exec touch {}/.gitkeep \;

          # iOS side: pull the tarball + extract into ios/Runner/PADAssets/
          mkdir -p ios/Runner/PADAssets
          if gh release view pad-assets >/dev/null 2>&1; then
            echo "Downloading pad-assets.tar.gz from release pad-assets ..."
            gh release download pad-assets \
              --pattern 'pad-assets.tar.gz' \
              --output pad-assets.tar.gz
            ls -lh pad-assets.tar.gz
            echo "Extracting into ios/Runner/PADAssets/ ..."
            tar -xzf pad-assets.tar.gz -C ios/Runner/PADAssets
            rm pad-assets.tar.gz
            echo "iOS asset tree size after extract:"
            du -sh ios/Runner/PADAssets
          else
            echo "::warning::pad-assets release not found — IPA will ship with empty PADAssets/."
            if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
              echo "::error::Tag build cannot ship without assets. Run scripts/pack_and_upload_assets.sh from your dev machine first."
              exit 1
            fi
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      # === UNSIGNED BUILD (every push) — verifies iOS compilation works ===
      - name: Build Flutter iOS framework
        run: |
          flutter build ios --release --no-codesign 2>&1 || true
          echo "Flutter build step complete (codesign error is expected)"

      - name: Build with xcodebuild (no signing)
        run: |
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -20
          echo "Xcode build succeeded — iOS compilation verified"

      # === SIGNED BUILD (only on tags, requires Apple Developer secrets) ===
      - name: Install Apple certificate and provisioning profile
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$BUILD_CERTIFICATE_BASE64" ]; then
            echo "::warning::Signing secrets not configured. Skipping signed build."
            exit 0
          fi

          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build signed IPA
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -z "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ]; then
            echo "Skipping signed build - secrets not configured"
            exit 0
          fi
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload signed IPA
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: awing-ios-signed
          path: build/ios/ipa/*.ipa
          retention-days: 90
          if-no-files-found: ignore

      # === AUTO-UPLOAD TO TESTFLIGHT ===
      # Pushes the signed IPA to App Store Connect via fastlane pilot.
      # Runs only on tags AND only when the App Store Connect API secrets
      # are configured. The build still succeeds (and the IPA is still
      # uploaded as a workflow artifact) if the upload is skipped.
      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          APP_STORE_CONNECT_API_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          APP_STORE_CONNECT_API_KEY_KEY: ${{ secrets.ASC_KEY_BASE64 }}
          APP_STORE_CONNECT_API_KEY_IS_KEY_CONTENT_BASE64: 'true'
          APP_STORE_CONNECT_API_KEY_IN_HOUSE: 'false'
        run: |
          if [ -z "${APP_STORE_CONNECT_API_KEY_ID:-}" ]; then
            echo "::warning::App Store Connect API secrets not set — skipping TestFlight upload."
            exit 0
          fi
          gem install fastlane --no-document --quiet
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::No IPA found at build/ios/ipa/*.ipa"
            exit 1
          fi
          echo "Uploading $IPA to TestFlight via fastlane pilot..."
          fastlane pilot upload \
            --ipa "$IPA" \
            --app_identifier "com.awing.awingAiLearning" \
            --skip_waiting_for_build_processing \
            --skip_submission
          echo "✓ Build uploaded — Apple processes for 10-15 min before TestFlight install becomes available."

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
