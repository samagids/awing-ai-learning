name: Build iOS

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-ios:
    runs-on: macos-latest
    # 90 min: signed Flutter iOS archives with the full ~1 GB PAD asset
    # bundle take 35-50 min just for archive+sign; the IPA export +
    # TestFlight upload steps add another 10-15 min. v1.11.0+36-test-1
    # was killed at 45m 24s — Xcode archive done but IPA export never
    # got to run.
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      # === DOWNLOAD PAD ASSETS FROM GITHUB RELEASE ===
      # iOS doesn't have Play Asset Delivery — instead, the same audio +
      # image tarball published by scripts/pack_and_upload_assets.sh is
      # extracted into ios/Runner/PADAssets/. That folder is registered
      # in project.pbxproj as a folder reference, so Xcode auto-bundles
      # everything inside it into Runner.app/PADAssets/.
      # AssetPackHandler.swift reads from there at runtime.
      - name: Download PAD asset bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Android-side placeholder so `flutter build` doesn't trip on
          # missing dirs (the iOS build doesn't ship these, but the
          # Flutter build phase still scans the workspace).
          mkdir -p android/install_time_assets/src/main/assets/audio
          mkdir -p android/install_time_assets/src/main/assets/images/vocabulary
          find android/install_time_assets -type d -empty -exec touch {}/.gitkeep \;

          # iOS side: pull the tarball + extract into ios/Runner/PADAssets/
          mkdir -p ios/Runner/PADAssets
          if gh release view pad-assets >/dev/null 2>&1; then
            echo "Downloading pad-assets.tar.gz from release pad-assets ..."
            gh release download pad-assets \
              --pattern 'pad-assets.tar.gz' \
              --output pad-assets.tar.gz
            ls -lh pad-assets.tar.gz
            echo "Extracting into ios/Runner/PADAssets/ ..."
            tar -xzf pad-assets.tar.gz -C ios/Runner/PADAssets
            rm pad-assets.tar.gz
            echo "iOS asset tree size after extract:"
            du -sh ios/Runner/PADAssets
          else
            echo "::warning::pad-assets release not found — IPA will ship with empty PADAssets/."
            if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
              echo "::error::Tag build cannot ship without assets. Run scripts/pack_and_upload_assets.sh from your dev machine first."
              exit 1
            fi
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Install CocoaPods dependencies
        working-directory: ios
        run: pod install

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      # === UNSIGNED BUILD (non-tag pushes only) — verifies iOS compiles ===
      # On tag builds we go straight to the signed build to save ~10 min.
      # On main/PR pushes we run the unsigned verify so compile breakage
      # is caught early without needing signing secrets.
      - name: Build Flutter iOS framework (unsigned verify)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          flutter build ios --release --no-codesign 2>&1 || true
          echo "Flutter build step complete (codesign error is expected)"

      - name: Build with xcodebuild (no signing)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: |
          cd ios
          xcodebuild build \
            -workspace Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -20
          echo "Xcode build succeeded — iOS compilation verified"

      # === SIGNED BUILD (only on tags, requires Apple Developer secrets) ===
      - name: Install Apple certificate and provisioning profile
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail

          # Hard-fail (not warn) if any required secret is missing — silently
          # skipping signing produces an unsigned build that fails downstream
          # with a confusing "no profile found" error.
          MISSING=()
          [ -z "${BUILD_CERTIFICATE_BASE64:-}" ]      && MISSING+=("BUILD_CERTIFICATE_BASE64")
          [ -z "${P12_PASSWORD:-}" ]                  && MISSING+=("P12_PASSWORD")
          [ -z "${BUILD_PROVISION_PROFILE_BASE64:-}" ] && MISSING+=("BUILD_PROVISION_PROFILE_BASE64")
          [ -z "${KEYCHAIN_PASSWORD:-}" ]             && MISSING+=("KEYCHAIN_PASSWORD")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing required signing secrets: ${MISSING[*]}"
            echo "Add them at: https://github.com/${{ github.repository }}/settings/secrets/actions"
            exit 1
          fi

          # Sanity-check the secret payload sizes — a 0-byte secret means the
          # value was set but the user pasted nothing/whitespace, which doesn't
          # trip the [ -z ] check above.
          CERT_LEN=${#BUILD_CERTIFICATE_BASE64}
          PP_LEN=${#BUILD_PROVISION_PROFILE_BASE64}
          echo "Secret length checks: cert=$CERT_LEN chars, profile=$PP_LEN chars"
          if [ "$CERT_LEN" -lt 1000 ]; then
            echo "::error::BUILD_CERTIFICATE_BASE64 only $CERT_LEN chars — expected ~4480 for a Distribution cert .p12. Re-add the secret."
            exit 1
          fi
          if [ "$PP_LEN" -lt 5000 ]; then
            echo "::error::BUILD_PROVISION_PROFILE_BASE64 only $PP_LEN chars — expected ~16000 for an App Store provisioning profile. Re-add the secret."
            exit 1
          fi

          # === Keychain + cert ===
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
          security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # === Provisioning profile ===
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

          # Verify the decode produced a real CMS-wrapped mobileprovision (not
          # an empty file or random garbage from a truncated secret).
          if [ ! -s "$PP_PATH" ]; then
            echo "::error::Decoded $PP_PATH is empty — BUILD_PROVISION_PROFILE_BASE64 secret may be truncated."
            exit 1
          fi
          PP_BYTES=$(stat -f '%z' "$PP_PATH")
          echo "Decoded profile size: $PP_BYTES bytes"

          # Extract + print the profile's Name and TeamIdentifier so we can
          # verify they match what project.pbxproj expects. If the secret
          # holds the WRONG profile (e.g. a Development profile vs App
          # Store), we'll see it here BEFORE wasting 10 min on a doomed
          # archive.
          PP_PLIST=$(security cms -D -i "$PP_PATH" 2>/dev/null || true)
          if [ -z "$PP_PLIST" ]; then
            echo "::error::Could not decode $PP_PATH as a CMS-wrapped mobileprovision. Secret content is corrupt."
            exit 1
          fi

          PP_NAME=$(echo "$PP_PLIST" | /usr/libexec/PlistBuddy -c "Print :Name" /dev/stdin 2>/dev/null || echo "<unreadable>")
          PP_TEAM=$(echo "$PP_PLIST" | /usr/libexec/PlistBuddy -c "Print :TeamIdentifier:0" /dev/stdin 2>/dev/null || echo "<unreadable>")
          PP_APPID=$(echo "$PP_PLIST" | /usr/libexec/PlistBuddy -c "Print :Entitlements:application-identifier" /dev/stdin 2>/dev/null || echo "<unreadable>")
          PP_UUID=$(echo "$PP_PLIST" | /usr/libexec/PlistBuddy -c "Print :UUID" /dev/stdin 2>/dev/null || echo "<unreadable>")
          echo "Provisioning profile contents:"
          echo "  Name:                   $PP_NAME"
          echo "  TeamIdentifier:         $PP_TEAM"
          echo "  application-identifier: $PP_APPID"
          echo "  UUID:                   $PP_UUID"

          EXPECTED_NAME="Awing AI Learning App Store"
          EXPECTED_TEAM="9GUMAMVYJF"
          EXPECTED_APPID_SUFFIX="com.awing.awingAiLearning"
          if [ "$PP_NAME" != "$EXPECTED_NAME" ]; then
            echo "::error::Profile Name is '$PP_NAME' but project.pbxproj expects '$EXPECTED_NAME'. The BUILD_PROVISION_PROFILE_BASE64 secret holds the wrong file."
            exit 1
          fi
          if [ "$PP_TEAM" != "$EXPECTED_TEAM" ]; then
            echo "::error::Profile TeamIdentifier is '$PP_TEAM' but project.pbxproj expects '$EXPECTED_TEAM'."
            exit 1
          fi
          case "$PP_APPID" in
            *"$EXPECTED_APPID_SUFFIX"*) ;;
            *) echo "::error::Profile application-identifier '$PP_APPID' does not contain expected bundle '$EXPECTED_APPID_SUFFIX'." ; exit 1 ;;
          esac

          # Install into BOTH locations Xcode searches: the user-facing
          # MobileDevice dir AND the modern UserData/Provisioning Profiles
          # dir Xcode 14+ uses internally on macos-latest.
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles
          # Use the profile's own UUID as the filename — Xcode indexes by
          # UUID and a generic name like build_pp.mobileprovision can throw
          # off some Xcode versions.
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles/"$PP_UUID".mobileprovision
          cp "$PP_PATH" ~/Library/Developer/Xcode/UserData/Provisioning\ Profiles/"$PP_UUID".mobileprovision 2>/dev/null || true

          echo "Installed provisioning profile $PP_UUID"
          ls -la ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build signed IPA
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ -z "${{ secrets.BUILD_CERTIFICATE_BASE64 }}" ]; then
            echo "Skipping signed build - secrets not configured"
            exit 0
          fi
          flutter build ipa --release \
            --export-options-plist=ios/ExportOptions.plist

      - name: Upload signed IPA
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: awing-ios-signed
          path: build/ios/ipa/*.ipa
          retention-days: 90
          if-no-files-found: ignore

      # === AUTO-UPLOAD TO TESTFLIGHT ===
      # Pushes the signed IPA to App Store Connect via fastlane pilot.
      # Runs only on tags AND only when the App Store Connect API secrets
      # are configured. The build still succeeds (and the IPA is still
      # uploaded as a workflow artifact) if the upload is skipped.
      - name: Upload to TestFlight
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_KEY_BASE64: ${{ secrets.ASC_KEY_BASE64 }}
        run: |
          set -euo pipefail

          # Fail loudly if any of the three ASC secrets is missing.
          MISSING=()
          [ -z "${ASC_KEY_ID:-}" ]      && MISSING+=("ASC_KEY_ID")
          [ -z "${ASC_ISSUER_ID:-}" ]   && MISSING+=("ASC_ISSUER_ID")
          [ -z "${ASC_KEY_BASE64:-}" ]  && MISSING+=("ASC_KEY_BASE64")
          if [ ${#MISSING[@]} -gt 0 ]; then
            echo "::error::Missing ASC API secrets: ${MISSING[*]}"
            exit 1
          fi

          # Decode the .p8 to a tempfile.
          KEY_PATH="$RUNNER_TEMP/asc_key.p8"
          echo -n "$ASC_KEY_BASE64" | base64 --decode > "$KEY_PATH"
          if [ ! -s "$KEY_PATH" ]; then
            echo "::error::Decoded ASC key is empty — ASC_KEY_BASE64 may be truncated."
            exit 1
          fi
          # Quick sanity check that the decode produced a real PEM.
          if ! head -1 "$KEY_PATH" | grep -q "BEGIN PRIVATE KEY"; then
            echo "::error::Decoded ASC key doesn't start with '-----BEGIN PRIVATE KEY-----'."
            exit 1
          fi

          # fastlane pilot wants either a --username (legacy Apple ID auth) or an
          # --api_key_path pointing to a JSON file describing the App Store
          # Connect API key. The APP_STORE_CONNECT_API_KEY_* env vars are honored
          # by the separate `app_store_connect_api_key` action — NOT by `pilot`
          # directly. Build the JSON explicitly via python (avoids quoting
          # nightmares with the multi-line PEM body in shell).
          JSON_PATH="$RUNNER_TEMP/asc_api_key.json"
          KEY_PATH="$KEY_PATH" \
          ASC_KEY_ID="$ASC_KEY_ID" \
          ASC_ISSUER_ID="$ASC_ISSUER_ID" \
          python3 - <<'PY' > "$JSON_PATH"
          import json, os
          with open(os.environ["KEY_PATH"]) as fh:
              key = fh.read()
          print(json.dumps({
              "key_id": os.environ["ASC_KEY_ID"],
              "issuer_id": os.environ["ASC_ISSUER_ID"],
              "key": key,
              "duration": 1200,
              "in_house": False,
          }))
          PY

          # Verify JSON parses cleanly before handing to fastlane.
          python3 -c "import json,sys; json.load(open('$JSON_PATH'))" || {
              echo "::error::Generated ASC API key JSON is not valid."
              exit 1
          }
          echo "ASC API key JSON: $(stat -f '%z' "$JSON_PATH") bytes"

          gem install fastlane --no-document --quiet
          IPA=$(find build/ios/ipa -name "*.ipa" | head -1)
          if [ -z "$IPA" ]; then
            echo "::error::No IPA found at build/ios/ipa/*.ipa"
            exit 1
          fi
          echo "Uploading $IPA to TestFlight via fastlane pilot..."
          fastlane pilot upload \
            --api_key_path "$JSON_PATH" \
            --ipa "$IPA" \
            --app_identifier "com.awing.awingAiLearning" \
            --skip_waiting_for_build_processing \
            --skip_submission
          echo "✓ Build uploaded — Apple processes for 10-15 min before TestFlight install becomes available."

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db 2>/dev/null || true
