name: Build Android APK

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Create placeholder assets (generated locally, not in repo)
        run: |
          # model.tflite is 43MB and generated by convert_model.py — create placeholder for CI
          touch assets/model.tflite
          # Ensure all audio directories have at least one file so Flutter doesn't complain
          for dir in assets/audio/boy/alphabet assets/audio/boy/vocabulary assets/audio/boy/sentences assets/audio/boy/stories \
                     assets/audio/girl/alphabet assets/audio/girl/vocabulary assets/audio/girl/sentences assets/audio/girl/stories \
                     assets/audio/young_man/alphabet assets/audio/young_man/vocabulary assets/audio/young_man/sentences assets/audio/young_man/stories \
                     assets/audio/young_woman/alphabet assets/audio/young_woman/vocabulary assets/audio/young_woman/sentences assets/audio/young_woman/stories \
                     assets/audio/man/alphabet assets/audio/man/vocabulary assets/audio/man/sentences assets/audio/man/stories \
                     assets/audio/woman/alphabet assets/audio/woman/vocabulary assets/audio/woman/sentences assets/audio/woman/stories \
                     assets/audio/alphabet assets/audio/vocabulary assets/audio/tones assets/audio/sentences assets/audio/stories assets/audio/dictionary \
                     assets/images; do
            mkdir -p "$dir"
            [ -z "$(ls -A $dir 2>/dev/null)" ] && touch "$dir/.gitkeep"
          done

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/awing-1.2.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: awing-android-apk
          path: build/app/outputs/flutter-apk/awing-1.2.0.apk
          retention-days: 30

      - name: Build App Bundle (for Play Store)
        if: startsWith(github.ref, 'refs/tags/v')
        run: flutter build appbundle --release

      - name: Upload AAB artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: awing-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
