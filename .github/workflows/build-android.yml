name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      # === DOWNLOAD PAD ASSETS FROM GITHUB RELEASE ===
      # The 945 MB audio + image tree is gitignored (regenerated locally
      # via scripts/build_and_run.sh). For CI, the tree is published once
      # via scripts/pack_and_upload_assets.sh as a release asset on the
      # 'pad-assets' release. This step pulls + extracts it into the PAD
      # install-time module so the resulting AAB ships with full content.
      #
      # Falls back to placeholder dirs if the release asset is missing —
      # that only matters for dev pushes; tag builds will fail loudly if
      # the asset tarball isn't present.
      - name: Download PAD asset bundle
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p android/install_time_assets/src/main/assets
          if gh release view pad-assets >/dev/null 2>&1; then
            echo "Downloading pad-assets.tar.gz from release pad-assets ..."
            gh release download pad-assets \
              --pattern 'pad-assets.tar.gz' \
              --output pad-assets.tar.gz
            ls -lh pad-assets.tar.gz
            echo "Extracting into install_time_assets/src/main/assets/ ..."
            tar -xzf pad-assets.tar.gz -C android/install_time_assets/src/main/assets
            rm pad-assets.tar.gz
            echo "Asset tree size after extract:"
            du -sh android/install_time_assets/src/main/assets
          else
            echo "::warning::pad-assets release not found — building with placeholder assets."
            mkdir -p android/install_time_assets/src/main/assets/audio
            mkdir -p android/install_time_assets/src/main/assets/images/vocabulary
            find android/install_time_assets -type d -empty -exec touch {}/.gitkeep \;
            if [ "${{ startsWith(github.ref, 'refs/tags/v') }}" = "true" ]; then
              echo "::error::Tag build cannot ship without assets. Run scripts/pack_and_upload_assets.sh from your dev machine first."
              exit 1
            fi
          fi

      # === Setup release signing (every build, not just tags) ===
      - name: Setup signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::Signing secrets not configured. APK will use debug signing."
          else
            echo "$KEYSTORE_BASE64" | base64 --decode > android/awing-release-key.jks
            cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=${{ github.workspace }}/android/awing-release-key.jks
          EOF
            echo "Release signing configured."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      # === SIGNED APK (every push) ===
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/awing-1.2.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: awing-android-apk
          path: build/app/outputs/flutter-apk/awing-1.2.0.apk
          retention-days: 30

      # === SIGNED APP BUNDLE for Play Store (only on tags) ===
      - name: Build signed App Bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ ! -f android/key.properties ]; then
            echo "Skipping — no signing key configured"
            exit 0
          fi
          flutter build appbundle --release

      - name: Upload AAB artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: awing-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
          if-no-files-found: ignore

      # === AUTO-UPLOAD TO GOOGLE PLAY INTERNAL TESTING ===
      # Pushes the signed AAB to Play Console via the Google Play Developer API.
      # Runs only on tags AND only when PLAY_SERVICE_ACCOUNT_JSON is configured.
      # The build still succeeds (and the AAB is still uploaded as a workflow
      # artifact) if this upload is skipped.
      - name: Upload to Play Internal Testing
        if: startsWith(github.ref, 'refs/tags/v')
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.awing.learning
          releaseFiles: build/app/outputs/bundle/release/app-release.aab
          track: internal
          status: completed
        continue-on-error: true
