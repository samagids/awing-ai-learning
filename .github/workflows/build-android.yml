name: Build Android

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  build-android:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Flutter version info
        run: flutter --version

      - name: Create placeholder assets (generated locally, not in repo)
        run: |
          touch assets/model.tflite
          mkdir -p assets/audio/boy/alphabet assets/audio/boy/vocabulary assets/audio/boy/sentences assets/audio/boy/stories
          mkdir -p assets/audio/girl/alphabet assets/audio/girl/vocabulary assets/audio/girl/sentences assets/audio/girl/stories
          mkdir -p assets/audio/young_man/alphabet assets/audio/young_man/vocabulary assets/audio/young_man/sentences assets/audio/young_man/stories
          mkdir -p assets/audio/young_woman/alphabet assets/audio/young_woman/vocabulary assets/audio/young_woman/sentences assets/audio/young_woman/stories
          mkdir -p assets/audio/man/alphabet assets/audio/man/vocabulary assets/audio/man/sentences assets/audio/man/stories
          mkdir -p assets/audio/woman/alphabet assets/audio/woman/vocabulary assets/audio/woman/sentences assets/audio/woman/stories
          mkdir -p assets/audio/alphabet assets/audio/vocabulary assets/audio/tones assets/audio/sentences assets/audio/stories assets/audio/dictionary
          mkdir -p assets/images assets/images/vocabulary
          find assets -type d -empty -exec touch {}/.gitkeep \;

      # === Setup release signing (every build, not just tags) ===
      - name: Setup signing key
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -z "$KEYSTORE_BASE64" ]; then
            echo "::warning::Signing secrets not configured. APK will use debug signing."
          else
            echo "$KEYSTORE_BASE64" | base64 --decode > android/awing-release-key.jks
            cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=${{ github.workspace }}/android/awing-release-key.jks
          EOF
            echo "Release signing configured."
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Run Flutter analyze
        run: flutter analyze --no-fatal-infos
        continue-on-error: true

      - name: Run tests
        run: flutter test
        continue-on-error: true

      # === SIGNED APK (every push) ===
      - name: Build APK
        run: flutter build apk --release

      - name: Rename APK
        run: mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/awing-1.2.0.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: awing-android-apk
          path: build/app/outputs/flutter-apk/awing-1.2.0.apk
          retention-days: 30

      # === SIGNED APP BUNDLE for Play Store (only on tags) ===
      - name: Build signed App Bundle
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ ! -f android/key.properties ]; then
            echo "Skipping — no signing key configured"
            exit 0
          fi
          flutter build appbundle --release

      - name: Upload AAB artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v4
        with:
          name: awing-android-aab
          path: build/app/outputs/bundle/release/app-release.aab
          retention-days: 90
          if-no-files-found: ignore
