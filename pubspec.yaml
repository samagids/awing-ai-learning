name: awing_ai_learning

description: A lightweight on-device AI application to teach the Awing language.

# Author: Dr. Guidion Sama, DIT

publish_to: "none"

version: 1.11.0+42

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.12.1
  speech_to_text: ^7.0.0
  path_provider: ^2.1.4
  provider: ^6.1.2
  flutter_tts: ^4.2.0
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.3
  confetti: ^0.8.0
  flutter_native_splash: ^2.4.3
  share_plus: ^10.1.4
  file_picker: ^8.1.6
  record: ^5.1.3
  url_launcher: ^6.3.1
  google_sign_in: ^6.2.2
  # Sign in with Apple — required by App Store Review Guideline 4.8 since the
  # app offers Google Sign-In. iOS-only at runtime; Android falls through to
  # the Google flow. ^6.1.0 supports Flutter 3.22+.
  sign_in_with_apple: ^6.1.4
  http: ^1.2.2
  firebase_core: ^3.8.1
  firebase_auth: ^5.3.4
  cloud_firestore: ^5.6.0
  nsd: ^5.0.1
  network_info_plus: ^6.1.1

dependency_overrides:
  record_linux: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Generates platform-specific app icon sets from a single source PNG.
  # Run: dart run flutter_launcher_icons
  flutter_launcher_icons: ^0.14.4

flutter_native_splash:
  color: "#006432"
  image: assets/splash_icon.png
  android: true
  ios: true

# Generates the actual app icon (separate from flutter_native_splash which
# only does the launch screen). Without this, the iOS app icon is the
# default Flutter placeholder — visible on the home screen and in the
# App Store listing. iOS requires icons WITHOUT alpha channel; the
# remove_alpha_ios flag strips it before bundling.
flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/images/app_icon.png"
  remove_alpha_ios: true
  background_color_ios: "#006432"
  adaptive_icon_background: "#006432"
  adaptive_icon_foreground: "assets/images/app_icon.png"
  min_sdk_android: 26

flutter:
  uses-material-design: true
  assets:
    - config/webhooks.json
    - assets/images/app_icon.png
    # Large assets (audio + images) are in Play Asset Delivery pack
    # See android/install_time_assets/ — accessed via AssetPackService
