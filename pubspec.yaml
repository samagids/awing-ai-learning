name: awing_ai_learning

description: A lightweight on-device AI application to teach the Awing language.

author: Dr. Guidion Sama, DIT

publish_to: "none"

version: 1.2.0+4

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  tflite_flutter: ^0.12.1
  speech_to_text: ^7.0.0
  path_provider: ^2.1.4
  provider: ^6.1.2
  flutter_tts: ^4.2.0
  audioplayers: ^6.1.0
  shared_preferences: ^2.3.3
  confetti: ^0.8.0
  flutter_native_splash: ^2.4.3
  share_plus: ^10.1.4
  file_picker: ^8.1.6
  record: ^5.1.3
  url_launcher: ^6.3.1
  google_sign_in: ^6.2.2
  http: ^1.2.2

dependency_overrides:
  record_linux: 1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter_native_splash:
  color: "#006432"
  image: assets/splash_icon.png
  android: true
  ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/model.tflite
    - config/webhooks.json
    # 6 character voices (Edge TTS neural — Swahili Bantu voices)
    # Beginner: boy + girl (child voices)
    - assets/audio/boy/alphabet/
    - assets/audio/boy/vocabulary/
    - assets/audio/boy/sentences/
    - assets/audio/boy/stories/
    - assets/audio/girl/alphabet/
    - assets/audio/girl/vocabulary/
    - assets/audio/girl/sentences/
    - assets/audio/girl/stories/
    # Medium: young_man + young_woman
    - assets/audio/young_man/alphabet/
    - assets/audio/young_man/vocabulary/
    - assets/audio/young_man/sentences/
    - assets/audio/young_man/stories/
    - assets/audio/young_woman/alphabet/
    - assets/audio/young_woman/vocabulary/
    - assets/audio/young_woman/sentences/
    - assets/audio/young_woman/stories/
    # Expert: man + woman (adult voices)
    - assets/audio/man/alphabet/
    - assets/audio/man/vocabulary/
    - assets/audio/man/sentences/
    - assets/audio/man/stories/
    - assets/audio/woman/alphabet/
    - assets/audio/woman/vocabulary/
    - assets/audio/woman/sentences/
    - assets/audio/woman/stories/
    # Legacy flat structure (backward compatibility)
    - assets/audio/alphabet/
    - assets/audio/vocabulary/
    - assets/audio/tones/
    - assets/audio/sentences/
    - assets/audio/stories/
    - assets/audio/dictionary/
    - assets/images/
